{% load static %}<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ page_title|default:"IndusMind AI" }}{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS (CDN runtime build, no local build step required) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
          },
          colors: {
            "primary-blue": "#2563EB",
            "dark-navy": "#0F172A",
            "light-bg": "#F8FAFC",
            "accent-cyan": "#06B6D4",
            "accent-purple": "#7C3AED",
            "brand-text": "#0F172A",
            "brand-success": "#10B981",
          },
        },
      },
    };
  </script>

  <!-- Design System (shared with landing page — reused, not duplicated) -->
  <link rel="stylesheet" href="{% static 'css/design-system.css' %}">
  <!-- Dashboard-specific styles -->
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body class="font-sans bg-light-bg text-brand-text antialiased dashboard-body">

  {% block content %}{% endblock %}

  <!-- GSAP core + ScrollTrigger (CDN, shared with landing page) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- Reused from the landing page design system -->
  <script src="{% static 'js/counters.js' %}"></script>
  <script src="{% static 'js/ui-interactions.js' %}"></script>

  <!-- Dashboard-specific behavior -->
  <script src="{% static 'js/dark-mode.js' %}"></script>
  <script src="{% static 'js/dashboard-sidebar.js' %}"></script>
  <script src="{% static 'js/dashboard-animations.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
